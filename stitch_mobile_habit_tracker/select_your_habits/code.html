<script>
        let selectedCount = 0;
        const maxSelected = 5;
        const continueBtn = document.getElementById('continue-btn');
        const countDisplay = document.getElementById('selection-count');
        const progressFill = document.getElementById('progress-fill');
        const hintDisplay = document.getElementById('selection-hint');

        function toggleHabit(element) {
            const isSelected = element.classList.contains('habit-card-selected');
            const icon = element.querySelector('.material-symbols-outlined:last-child');
            
            if (!isSelected && selectedCount < maxSelected) {
                // Select
                element.classList.add('habit-card-selected');
                element.classList.remove('border-transparent');
                element.style.borderColor = '#006b5f';
                icon.classList.remove('opacity-0');
                icon.style.fontVariationSettings = "'FILL' 1";
                selectedCount++;
            } else if (isSelected) {
                // Deselect
                element.classList.remove('habit-card-selected');
                element.classList.add('border-transparent');
                element.style.borderColor = 'transparent';
                icon.classList.add('opacity-0');
                icon.style.fontVariationSettings = "'FILL' 0";
                selectedCount--;
            }

            updateUI();
        }

        function updateUI() {
            // Update Text
            countDisplay.innerText = `${selectedCount} of ${maxSelected} selected`;
            
            // Update Progress Bar
            const percentage = (selectedCount / maxSelected) * 100;
            progressFill.style.width = `${Math.min(percentage, 100)}%`;

            // Update Continue Button
            if (selectedCount === maxSelected) {
                continueBtn.disabled = false;
                continueBtn.classList.remove('bg-outline', 'text-on-surface/30');
                continueBtn.classList.add('bg-primary-container', 'text-on-primary-container');
                hintDisplay.innerText = "Ready to start!";
                hintDisplay.classList.add('text-primary');
            } else {
                continueBtn.disabled = true;
                continueBtn.classList.add('bg-outline', 'text-on-surface/30');
                continueBtn.classList.remove('bg-primary-container', 'text-on-primary-container');
                hintDisplay.innerText = selectedCount < maxSelected ? `Select ${maxSelected - selectedCount} more` : "Too many selected";
                hintDisplay.classList.remove('text-primary');
            }

            // Visual feedback for over-selection if applicable
            if (selectedCount > maxSelected) {
                countDisplay.classList.add('text-error');
            } else {
                countDisplay.classList.remove('text-error');
            }
        }
    </script>
